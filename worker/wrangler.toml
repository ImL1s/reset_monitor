name = "reset-radar"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "reset-radar"
database_id = "44cf30e0-3b33-4140-af41-b5a7f496b146"

[[kv_namespaces]]
binding = "STATE"
id = "e70f0558083a417083602c791bb188f0"

[vars]
SCHEMA_VERSION = "1"
# Production fail-closed. Local: npm run dev:local sets bypass=1 in process.
ADMIN_DEV_BYPASS = "0"
# Free-auto: FxTwitter poll + strict auto-green (no paid X API).
AUTO_PUBLISH = "1"
MONITORING_ENABLED = "1"

# Poll allowlisted timelines every 10 minutes
[triggers]
crons = ["*/10 * * * *"]
