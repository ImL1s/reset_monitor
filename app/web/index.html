<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Public AI coding usage RESET radar — zero login. Track Codex, Claude, and more staff/global hard resets.">
  <meta name="theme-color" content="#0B1220">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph -->
  <meta property="og:title" content="RESET Radar">
  <meta property="og:description" content="Zero-auth public board for AI coding tool usage hard resets.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RESET Radar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RESET Radar</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #0B1220;
      color: #F8FAFC;
    }
    /* Loading splash before Flutter paints */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      font-family: system-ui, -apple-system, sans-serif;
      pointer-events: none;
    }
    .loading-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 16px rgba(34, 197, 94, 0.45);
    }
    @media (prefers-reduced-motion: reduce) {
      .loading-dot { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading" aria-hidden="true">
    <div class="loading-dot"></div>
    <div style="color:#94A3B8;font-size:14px;">RESET Radar</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
